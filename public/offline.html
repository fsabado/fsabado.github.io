<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        var saved = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = saved || (prefersDark ? 'dark' : 'light');
        document.documentElement.classList.toggle('dark', theme === 'dark');
      })();
    </script>
    <meta name="theme-color" content="#2563eb" />
    <title>Offline — Francis Sabado</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: ui-sans-serif, system-ui, sans-serif;
        background: #fff;
        color: #0f172a;
      }
      .dark body {
        background: #0f172a;
        color: #f1f5f9;
      }
      .card {
        max-width: 28rem;
        padding: 2rem;
        border-radius: 0.75rem;
        border: 1px solid #e2e8f0;
        background: #f8fafc;
        text-align: center;
      }
      .dark .card {
        border-color: #334155;
        background: #1e293b;
      }
      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.5rem;
        font-weight: 700;
      }
      p {
        margin: 0 0 1.5rem;
        line-height: 1.5;
        color: #475569;
      }
      .dark p {
        color: #94a3b8;
      }
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.625rem 1.25rem;
        border-radius: 0.5rem;
        font-weight: 500;
        text-decoration: none;
        background: #2563eb;
        color: #fff;
      }
      a:hover {
        background: #1d4ed8;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You’re offline</h1>
      <p>Check your connection, then try again. Cached pages may still open if you’ve visited them before.</p>
      <a href="/">Back to home</a>
    </div>
  </body>
</html>
